<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Segmentation des Clients</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></link>
</head>
<body class="bg-light">
	<div class="container mt-5">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<div class="card shadow-lg">
					<div class="card-body">
						<h3 class="card-title text-center mb-5">Segmentation Client<br/>
							<small class="text-muted">Data Mining Non Supervisé</small></h3>
						<form method="POST" action="/prediction">
							<div class="mb-3">
								<label class="form-label">Age</label>
								<input type="number" name="age" class="form-control" placeholder="Ex.30" required>
							</div>
							<div class="mb-3">
								<label class="form-label">Revenus annuels</label>
								<input type="number" name="revenu" class="form-control" placeholder="Ex.60" required> en milliers (K$)
							</div>
							<div class="mb-3">
								<label class="form-label">Dépenses annuelles</label>
								<input type="number" name="depense" class="form-control" placeholder="Ex.70" required> en milliers (K$)
							</div>
							<div class="d-grid">
								<button type="submit" class="btn btn-primary btn-lg">Analyser</button>
							</div>
						</form>
					</div>
				</div>
				<p class="text-center mt-3 text-muted">Projet de segmentation client - Data Mining descriptif</p>
			</div>
		</div>
	</div>
</body>
</html>
